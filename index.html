<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loudness A/B Reliability Test</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <div class="headerRow">
      <div>
        <h1>Loudness A/B Reliability Test</h1>
        <p class="subtitle">Test whether someone can reliably detect a small dB difference.</p>
      </div>
      <label class="themeToggle" for="themeToggle">
        <input id="themeToggle" type="checkbox" />
        Dark theme
      </label>
    </div>

    <section class="card" id="setupCard">
      <h2>Setup</h2>
      <div class="grid">
        <label>
          Audio file
          <input id="fileInput" type="file" accept="audio/*" />
        </label>

        <label>
          dB difference (positive, e.g. 0.1 or 0.01)
          <input id="dbInput" type="number" min="0.01" step="0.01" value="0.10" />
        </label>

        <label>
          Number of trials
          <input id="trialCountInput" type="number" min="1" step="1" value="20" />
        </label>
      </div>

      <button id="startBtn" disabled>Start Test</button>
      <p id="setupStatus" class="status">Choose an audio file to begin.</p>
    </section>

    <section class="card hidden" id="testCard">
      <h2>Trial <span id="trialIndex">1</span>/<span id="trialTotal">1</span></h2>

      <div class="transport">
        <button id="playPauseBtn">Play</button>
        <button id="stopBtn">Stop</button>
        <input id="seekBar" type="range" min="0" max="1000" value="0" />
        <span id="timelineTime" class="timelineTime">00:00 / 00:00</span>
      </div>

      <div class="abButtons">
        <button id="listenABtn" class="variantBtn">Listen A</button>
        <button id="listenBBtn" class="variantBtn">Listen B</button>
      </div>

      <div class="guess">
        <p>Which one is louder?</p>
        <button id="guessALouderBtn" class="guessBtn">A is louder</button>
        <button id="guessBLouderBtn" class="guessBtn">B is louder</button>
      </div>

      <p id="trialStatus" class="status"></p>
    </section>

    <section class="card hidden" id="resultCard">
      <h2>Results</h2>
      <div id="resultBody"></div>
      <button id="restartBtn">Run Another Test</button>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
